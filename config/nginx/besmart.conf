server {
    listen 443 ssl;
    server_name 192.168.255.6 192.168.1.8 localhost;

    ssl_certificate     /etc/nginx/certs/cert.pem;
    ssl_certificate_key /etc/nginx/certs/key.pem;

    # Serve the root CA cert so the phone can download and install it
    location = /rootCA.pem {
        alias /etc/nginx/certs/rootCA.pem;
        default_type application/x-pem-file;
    }

    location / {
        proxy_pass http://besmart:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_cache_bypass $http_upgrade;
    }
}
